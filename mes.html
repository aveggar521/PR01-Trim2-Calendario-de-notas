<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Notas del mes</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app_mes.js" defer></script>
</head>

<body>
    <a href="index.html" id="btnVolver">← Volver al calendario</a>

    <h1 id="nombreMes"></h1>

    <h2>Nueva nota</h2>

    <form id="formNota">
        <label>Título</label>
        <input type="text" id="titulo" placeholder="Añade un título...">

        <label>Descripción</label>
        <textarea id="descripcion" placeholder="Descripción..."></textarea>

        <button type="submit" id="btnGuardar">Guardar</button>

        <p id="error"></p>
    </form>
    <h2>Notas del mes</h2>
    <ul id="listaNotas"></ul>
</body>

</html>
